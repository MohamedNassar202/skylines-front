<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="images/navbar_logo.jpeg" />

    <!-- bootstrap -->

    <link rel="stylesheet" href="CSS/bootstrap.min.css" />

    <!-- font awesome -->

    <link rel="stylesheet" href="CSS/all.min.css" />

    <!-- my css -->
    <link rel="stylesheet" href="CSS/cart.css" />

    <title>SkyLines Cart</title>
  </head>

  <body class="text-white">
    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-warning">
          <div class="modal-header border-warning">
            <h5 class="modal-title">
              <i class="fa-solid fa-user me-2 text-warning"></i>
              your Information
            </h5>

            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Full Name *</label>
              <input
                type="text"
                id="customerName"
                class="form-control"
                placeholder="Enter your full name"
              />
              <small id="customerNameError" class="text-danger"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone Number *</label>
              <input
                type="text"
                id="customerPhone"
                class="form-control"
                placeholder="01xxxxxxxxx"
              />
              <small id="customerPhoneError" class="text-danger"></small>
            </div>
            <div class="mb-3">
              <label class="form-label">Governorate</label>
              <select id="governorate" class="form-select"></select>
              <small id="governorateError" class="text-danger"></small>
            </div>
            <div class="mb-3">
              <label class="form-label">City</label>
              <select id="city" class="form-select"></select>
              <small id="cityError" class="text-danger"></small>
            </div>
            <div class="mb-3">
              <label class="form-label">Address *</label>
              <input
                type="text"
                id="customerAddress"
                class="form-control"
                placeholder="Street, Building..."
              />
              <small id="customerAddressError" class="text-danger"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Notes</label>
              <textarea
                id="customerNotes"
                class="form-control"
                rows="3"
                placeholder="Optional"
              ></textarea>
            </div>
          </div>

          <div class="modal-footer border-warning">
            <button id="closeCheckoutBtn" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>

            <button class="btn btn-success fw-bold" id="confirmCheckout">
              Send Order <i class="fa-brands fa-whatsapp"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- navbar -->

    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <!-- logo -->

        <a class="navbar-brand fw-bold" href="index.html">
          <img
            src="images/navbar_logo.jpeg"
            width="40"
            class="rounded-circle me-2"
          />

          Sky<span class="text-warning">Lines</span>
        </a>

        <!-- cart -->

        <a href="cart.html" class="text-white position-relative">
          <i class="fa-solid fa-cart-shopping fs-4"></i>

          <span
            id="cartCount"
            class="position-absolute top-0 start-100 translate-middle badge text-warning"
          >
          </span>
        </a>
      </div>
    </nav>

    <!-- cart section -->

    <div class="container py-5 mt-5">
      <!-- title -->

      <h2 class="text-center fw-bold my-5">🛒 My Cart</h2>

      <!-- cart items -->

      <div id="cartItems" class="row g-4"></div>

      <!-- total -->

      <div id="cartFooter" class="text-center mt-5">
        <h3 id="totalPrice" class="text-warning fw-bold"></h3>
        <!-- Continue Shopping -->
        <a
          href="products.html"
          class="btn btn-outline-warning mt-3 px-5 py-3 fw-bold continue-btn"
        >
          Continue Shopping
          <i class="fa-solid fa-arrow-right"></i>
        </a>

        <br />

        <!-- checkout -->

        <button
          class="btn btn-success mt-4 px-5 py-3 fw-bold continue-check-btn"
          data-bs-toggle="modal"
          data-bs-target="#checkoutModal"
        >
          Continue Checkout
          <i class="fa-solid fa-arrow-right ms-2"></i>
        </button>
      </div>
    </div>
    <!-- ! Loading Screen -->

    <div id="pageLoader" class="page-loader">
      <img
        src="images/navbar_logo.jpeg"
        class="loader-logo"
        alt="loader-logo"
      />
    </div>

    <!-- sweet alert -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- bootstrap -->
    <script src="JS/bootstrap.bundle.min.js"></script>
    <!-- egypt cities -->
    <script src="JS/egyptCities.js"></script>

    <!-- cart system -->

    <script src="JS/cart.js"></script>

    <!-- cart page -->

    <script src="JS/cartPage.js"></script>
    <!-- check out -->
    <script src="JS/checkout.js"></script>
  </body>
</html>
