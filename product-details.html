<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="images/navbar_logo.jpeg" />

    <link rel="stylesheet" href="CSS/all.min.css" />

    <link rel="stylesheet" href="CSS/bootstrap.min.css" />

    <link rel="stylesheet" href="CSS/productDetails.css" />

    <title>Product Details</title>
  </head>

  <body>
    <!-- navbar -->

    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <img
            src="images/navbar_logo.jpeg"
            loading="lazy"
            width="40"
            class="rounded-circle me-2"
          />Sky<span class="text-warning">Lines</span>
        </a>

        <a href="cart.html" class="text-white position-relative">
          <i class="fa-solid fa-cart-shopping fs-4"></i>

          <span
            id="cartCount"
            class="badge text-warning position-absolute top-0 start-100 translate-middle"
          ></span>
        </a>
      </div>
    </nav>

    <!-- product details -->

    <div class="container py-5 mt-5 overflow-x-hidden" id="productDetails">
      <div class="text-center">
        <div class="spinner-border text-warning"></div>
      </div>
    </div>
    <!-- ! Loading Screen -->

    <div id="pageLoader" class="page-loader">
      <img
        loading="lazy"
        src="images/navbar_logo.jpeg"
        class="loader-logo"
        alt="loader-logo"
      />
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="JS/bootstrap.bundle.min.js"></script>
    <script src="JS/cart.js"></script>
    <script src="JS/productDetails.js"></script>
  </body>
</html>
